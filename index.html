        <script src="js/leaflet-measure.js"></script>
        <script src="data/WCEDDistrictBoundaries_0.js"></script>
        <script>
        var highlightLayer;
        function highlightFeature(e) {
            highlightLayer = e.target;

            if (e.target.feature.geometry.type === 'LineString') {
              highlightLayer.setStyle({
                color: '#ffff00',
              });
            } else {
              highlightLayer.setStyle({
                fillColor: '#ffff00',
                fillOpacity: 1
              });
            }
        }
        var map = L.map('map', {
            zoomControl:true, maxZoom:28, minZoom:1
        })
        var hash = new L.Hash(map);
        map.attributionControl.setPrefix('<a href="https://github.com/tomchadwin/qgis2web" target="_blank">qgis2web</a> &middot; <a href="http://leafletjs.com" title="A JS library for interactive maps">Leaflet</a>');
        L.control.locate({locateOptions: {maxZoom: 19}}).addTo(map);
        var measureControl = new L.Control.Measure({
            position: 'topleft',
            primaryLengthUnit: 'meters',
            secondaryLengthUnit: 'kilometers',
            primaryAreaUnit: 'sqmeters',
            secondaryAreaUnit: 'hectares'
        });
        measureControl.addTo(map);
        document.getElementsByClassName('leaflet-control-measure-toggle')[0]
        .innerHTML = '';
        document.getElementsByClassName('leaflet-control-measure-toggle')[0]
        .className += ' fas fa-ruler';
        var bounds_group = new L.featureGroup([]);
        function setBounds() {
            if (bounds_group.getLayers().length) {
                map.fitBounds(bounds_group.getBounds());
            }
            map.setMaxBounds(map.getBounds());
        }
        function pop_WCEDDistrictBoundaries_0(feature, layer) {
            layer.on({
                mouseout: function(e) {
                    for (i in e.target._eventParents) {
                        e.target._eventParents[i].resetStyle(e.target);
                    }
                },
                mouseover: highlightFeature,
            });
            var popupContent = '<table>\
                    <tr>\
                        <th scope="row">WCED District</th>\
                        <td>' + (feature.properties['WCED District'] !== null ? Autolinker.link(String(feature.properties['WCED District'])) : '') + '</td>\
                    </tr>\
                    <tr>\
                        <th scope="row">06b_schools_available_Primary</th>\
                        <td>' + (feature.properties['06b_schools_available_Primary'] !== null ? Autolinker.link(String(feature.properties['06b_schools_available_Primary'])) : '') + '</td>\
                    </tr>\
                </table>';
            layer.bindPopup(popupContent, {maxHeight: 400});
        }

        function style_WCEDDistrictBoundaries_0_0(feature) {
            if (feature.properties['06b_schools_available_Primary'] >= 56.000000 && feature.properties['06b_schools_available_Primary'] <= 81.200000 ) {
                return {
                pane: 'pane_WCEDDistrictBoundaries_0',
                opacity: 1,
                color: 'rgba(35,35,35,1.0)',

                lineJoin: 'miter',
                weight: 1.0, 
                fill: true,
                fillOpacity: 1,
                fillColor: 'rgba(252,251,253,1.0)',
            }
            }
            if (feature.properties['06b_schools_available_Primary'] >= 81.200000 && feature.properties['06b_schools_available_Primary'] <= 106.400000 ) {
                return {
                pane: 'pane_WCEDDistrictBoundaries_0',
                opacity: 1,
                color: 'rgba(35,35,35,1.0)',
                dashArray: '',
                lineCap: 'butt',
                lineJoin: 'miter',
                weight: 1.0, 
                fill: true,
                fillOpacity: 1,
                fillColor: 'rgba(220,220,236,1.0)',
            }

                return {
                pane: 'pane_WCEDDistrictBoundaries_0',
                opacity: 1,
                color: 'rgba(35,35,35,1.0)',
                dashArray: '',
                lineCap: 'butt',
                lineJoin: 'miter',
                weight: 1.0,

                fillOpacity: 1,

            }

            if (feature.properties['06b_schools_available_Primary'] >= 131.600000 && feature.properties['06b_schools_available_Primary'] <= 156.800000 ) {
                return {

                opacity: 1,
                color: 'rgba(35,35,35,1.0)',
                dashArray: '',
                lineCap: 'butt',
                lineJoin: 'miter',
                weight: 1.0, 
                fill: true,
                fillOpacity: 1,
                fillColor: 'rgba(106,81,163,1.0)',
            }
            }
            if (feature.properties['06b_schools_available_Primary'] >= 156.800000 && feature.properties['06b_schools_available_Primary'] <= 182.000000 ) {
                return {
                pane: 'pane_WCEDDistrictBoundaries_0',
                opacity: 1,
                color: 'rgba(35,35,35,1.0)',
                dashArray: '',
                lineCap: 'butt',
                lineJoin: 'miter',
                weight: 1.0, 
                fill: true,
                fillOpacity: 1,
                fillColor: 'rgba(63,0,125,1.0)',
            }
            }
        }
        map.createPane('pane_WCEDDistrictBoundaries_0');
        map.getPane('pane_WCEDDistrictBoundaries_0').style.zIndex = 400;
        map.getPane('pane_WCEDDistrictBoundaries_0').style['mix-blend-mode'] = 'normal';
        var layer_WCEDDistrictBoundaries_0 = new L.geoJson(json_WCEDDistrictBoundaries_0, {
            attribution: '',
            pane: 'pane_WCEDDistrictBoundaries_0',
            onEachFeature: pop_WCEDDistrictBoundaries_0,
            style: style_WCEDDistrictBoundaries_0_0,
        });
        bounds_group.addLayer(layer_WCEDDistrictBoundaries_0);
        map.addLayer(layer_WCEDDistrictBoundaries_0);
        var osmGeocoder = new L.Control.Geocoder({
            collapsed: true,
            position: 'topleft',
            text: 'Search',
            title: 'Testing'
        }).addTo(map);
        document.getElementsByClassName('leaflet-control-geocoder-icon')[0]
        .className += ' fa fa-search';
        document.getElementsByClassName('leaflet-control-geocoder-icon')[0]
        .title += 'Search for a place';
        var baseMaps = {};
        L.control.layers(baseMaps,{'WCED District Boundaries<br /><table><tr><td style="text-align: center;"><img src="legend/WCEDDistrictBoundaries_0_56810.png" /></td><td>56 - 81</td></tr><tr><td style="text-align: center;"><img src="legend/WCEDDistrictBoundaries_0_811061.png" /></td><td>81 - 106</td></tr><tr><td style="text-align: center;"><img src="legend/WCEDDistrictBoundaries_0_1061322.png" /></td><td>106 - 132</td></tr><tr><td style="text-align: center;"><img src="legend/WCEDDistrictBoundaries_0_1321573.png" /></td><td>132 - 157</td></tr><tr><td style="text-align: center;"><img src="legend/WCEDDistrictBoundaries_0_1571824.png" /></td><td>157 - 182</td></tr></table>': layer_WCEDDistrictBoundaries_0,},{collapsed:false}).addTo(map);
        setBounds();
        </script>

</html>
